<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rep</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var match = path.match(/^\/invite\/([A-Za-z0-9]+)\/?$/);
      if (match) {
        window.location.replace('/invite/?code=' + match[1].toUpperCase());
      }
    })();
  </script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #F7EEDC; color: #3E2819; }
    a { color: #B8603C; }
  </style>
</head>
<body>
  <p>Page not found. <a href="/">Go home</a></p>
</body>
</html>
